        }
        .grain-overlay {
            pointer-events: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 99;
            opacity: 0.02;
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuB7xIr9HLfoCnuBfaB0lRyXLvbDpaHYjLS063WKDCAYsOY4TeGwAp3bw-GIyuHl4petn5qOfucWRn-7WbYYmVWWJD0aOJPcTCZUu4rEZIDLHFr30n7l_GRprz1birCY7SqJEOrVg1KOjOAQ85OFa9JNzhuhkkND1hOfZD8b62jCbomkXqa2NAbAlP5b6KyCPe3gsoj4imOD6oPRz2pgnWMK3XIKWqwbVvTVb-phlL4K4vqMeta6MaxEaoVeob4n6Yqdbz6qjuzBhxOL);
        }
        .visualizer-bar {
            width: 4px;
            border-radius: 2px;
            background: #aed366;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-ambient {
            filter: blur(80px);
            background: #496800;
            opacity: 0.12;
            border-radius: 50%;
        }

        /* Custom Animations */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        
        @keyframes breathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pulse-rhythmic {
            animation: pulse-soft 2s infinite ease-in-out;
        }

        .animate-breathing {
            animation: breathing 10s infinite ease-in-out;
        }

        .animate-entrance {
            animation: fade-in-up 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Reduced Motion accessibility */
        @media (prefers-reduced-motion: reduce) {
            .animate-pulse-rhythmic,
            .animate-breathing,
            .animate-entrance,
            .visualizer-bar {
                animation: none !important;
                transition: none !important;
                transform: none !important;
            }
            .animate-entrance {
                opacity: 1 !important;
            }
        }
    </style>

<script>
        const bars = document.querySelectorAll('.visualizer-bar');
        const playBtnContainer = document.querySelector('.play-btn-pulse-container');
        const playBtnIcon = playBtnContainer.querySelector('.material-symbols-outlined');
        let isPlaying = true;
        let visualizerInterval;

        function updateVisualizer() {
            if (!isPlaying) return;
            bars.forEach(bar => {
                const targetHeight = Math.floor(Math.random() * 26) + 6;
                bar.style.height = `${targetHeight}px`;
            });
        }

        function startVisualizer() {
            if (visualizerInterval) clearInterval(visualizerInterval);
            // Accessibility check
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                visualizerInterval = setInterval(updateVisualizer, 300);
            }
        }

        // Initialize
        startVisualizer();

        // Toggle for Play/Pause visual
        playBtnContainer.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtnIcon.style.opacity = '0';
            
            setTimeout(() => {
                playBtnIcon.textContent = isPlaying ? 'pause' : 'play_arrow';
                playBtnIcon.style.opacity = '1';
                
                if (isPlaying) {
                    playBtnContainer.classList.add('animate-pulse-rhythmic');
                    document.querySelector('.animate-pulse-rhythmic').style.animationPlayState = 'running';
                    startVisualizer();
                } else {
                    playBtnContainer.classList.remove('animate-pulse-rhythmic');
                    bars.forEach(bar => bar.style.height = '6px');
                }
            }, 100);
        });

        // Prefers reduced motion listener
        window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', (e) => {
            if (e.matches) {
                clearInterval(visualizerInterval);
                bars.forEach(bar => bar.style.height = '14px');
            } else if (isPlaying) {
                startVisualizer();
            }
        });
    </script>
