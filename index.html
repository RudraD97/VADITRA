<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VADITRA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Dancing+Script:wght@400;700&family=Caveat:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
    ::-webkit-scrollbar {
      width: 0;
      background: transparent
    }
    * { scrollbar-width: none }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes underlineGrow {
      0%, 100% { width: 24px; opacity: 0.4; }
      50% { width: 36px; opacity: 1; }
    }
    @keyframes underlinePulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes blinkIcon {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes likedPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .hide-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .snap-scroll { scroll-snap-type: y mandatory; }
    .snap-scroll > * { scroll-snap-align: center; scroll-snap-stop: always; }
    .song-enter { opacity: 0; transform: translateY(24px) scale(0.95); transition: all 0.5s cubic-bezier(.22,.68,0,1); }
    .song-visible { opacity: 1; transform: translateY(0) scale(1); }
    @keyframes equalizerBounce {
      0%, 100% { transform: scaleY(0.6); opacity: 0.6; }
      25% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.4); opacity: 0.7; }
      75% { transform: scaleY(0.8); opacity: 0.9; }
    }
  </style>

</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden selection:bg-primary-fixed-dim/30">
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
