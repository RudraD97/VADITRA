<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VADITRA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Dancing+Script:wght@400;700&family=Caveat:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
    ::-webkit-scrollbar {
      width: 0;
      background: transparent
    }
    * { scrollbar-width: none }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes underlineGrow {
      0%, 100% { width: 24px; opacity: 0.4; }
      50% { width: 36px; opacity: 1; }
    }
    @keyframes underlinePulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes blinkIcon {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes likedPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    @keyframes equalizerBounce {
      0%, 100% { transform: scaleY(0.6); opacity: 0.6; }
      25% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.4); opacity: 0.7; }
      75% { transform: scaleY(0.8); opacity: 0.9; }
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#243600",
            "on-secondary-fixed": "#151d19",
            "on-secondary": "#29322d",
            "outline": "#8e9380",
            "on-primary-fixed": "#141f00",
            "surface-tint": "#aed366",
            "primary-container": "#c9f07e",
            "error": "#ffb4ab",
            "surface-container": "#1e201f",
            "surface-bright": "#383a38",
            "on-secondary-fixed-variant": "#404943",
            "background": "#121413",
            "surface-dim": "#121413",
            "on-surface-variant": "#c4c9b5",
            "error-container": "#93000a",
            "surface-container-low": "#1a1c1b",
            "on-error-container": "#ffdad6",
            "inverse-on-surface": "#2f3130",
            "primary-fixed": "#c9f07e",
            "on-surface": "#e2e3e0",
            "primary-fixed-dim": "#aed366",
            "tertiary-container": "#e1e3e1",
            "on-tertiary": "#2e3130",
            "surface-container-high": "#282a29",
            "tertiary-fixed": "#e1e3e1",
            "secondary": "#bfc9c2",
            "tertiary-fixed-dim": "#c5c7c5",
            "inverse-primary": "#496800",
            "secondary-fixed-dim": "#bfc9c2",
            "surface": "#121413",
            "secondary-fixed": "#dbe5dd",
            "surface-variant": "#333534",
            "on-primary-fixed-variant": "#364e00",
            "on-primary-container": "#4f6e04",
            "surface-container-lowest": "#0d0f0e",
            "on-tertiary-fixed-variant": "#444746",
            "surface-container-highest": "#333534",
            "on-background": "#e2e3e0",
            "primary": "#ffffff",
            "inverse-surface": "#e2e3e0",
            "on-error": "#690005",
            "tertiary": "#ffffff",
            "on-tertiary-fixed": "#191c1b",
            "outline-variant": "#444939",
            "on-tertiary-container": "#626563",
            "on-secondary-container": "#aeb7b0",
            "secondary-container": "#404943"
          },
          "fontFamily": {
            "syne": ["Syne"],
            "inter": ["Inter"],
            "cursive": ['"Dancing Script"', "cursive"],
            "display-lg": ["Syne"],
            "headline-lg-mobile": ["Syne"],
            "headline-md": ["Syne"],
            "body-md": ["Inter"],
            "display-md": ["Syne"],
            "handwrite": ['"Caveat"', "cursive"],
            "body-lg": ["Inter"],
            "headline-lg": ["Syne"],
            "label-md": ["Inter"],
            "label-sm": ["Inter"]
          },
          "fontSize": {
            "display-lg": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
            "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "700" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
            "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "display-md": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.01em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
            "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500" }],
            "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.08em", "fontWeight": "600" }]
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden selection:bg-primary-fixed-dim/30">
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
