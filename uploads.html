<script>
    // Simple Interaction: Simulate Progress
    document.querySelectorAll('.bg-luminous-sage').forEach((bar, index) => {
        // Only target bars in the upload queue (skip the play button which has the same class)
        if(bar.classList.contains('h-full') && !bar.closest('.mini-player-height')) {
            setInterval(() => {
                let currentWidth = parseFloat(bar.style.width);
                if(currentWidth < 100) {
                    bar.style.width = (currentWidth + Math.random() * 0.5) + '%';
                    const parent = bar.closest('.flex-1');
                    if(parent) {
                        const percentDisplay = parent.querySelector('.text-luminous-sage');
                        if(percentDisplay) {
                            percentDisplay.innerText = Math.floor(parseFloat(bar.style.width)) + '%';
                        }
                    }
                }
            }, 1000);
        }
    });

    const uploadArea = document.querySelector('.upload-area');
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('bg-surface-container', 'border-luminous-sage');
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('bg-surface-container', 'border-luminous-sage');
    });
</script>
